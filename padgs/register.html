<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="./../assets/css/all.css">
    <link rel="stylesheet" href="./../assets/css/bootstarp.min.css">
    <link rel="stylesheet" href="./../assets/css/global.css">
    <link rel="stylesheet" href="./../assets/css/fonts.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary mb-4">
        <div class="container">
            <a class="navbar-brand" href="./../index.html" style="width: 10%;">
                <img src="./../assets/images/dashboard.jpeg" alt class="img-fluid">
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="./../index.html">Home</a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                        Ethar Hamdy
                        </a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="./dashboard.html">Dashboard</a></li>
                            <li><a class="dropdown-item" href="./register.html">Create new user</a></li>
                            <li><a class="dropdown-item" href="#">Logout</a></li>
                        </ul>
                     </li>
                </ul>
            </div>
        </div>
    </nav>
    <form class="m-auto w-25">
        <h1 class="text-center mb-4 text-light">Register</h1>
        <div class="mb-3">
            <label class="text-light form-label">Type :</label>
            <select class="form-select" aria-label="Default select example">
            <option value="1">Admin</option>
            <option value="2">Client</option>
            <option value="3">Trader</option>
        </select>
        </div>
        <div class="mb-3">
            <label for="exampleInputName" class="form-label text-light">Name :</label>
            <input type="name" class="form-control" id="exampleInputName">
        </div>
        <div class="mb-3">
            <label for="exampleInputEmail1" class="form-label text-light">Email :</label>
            <input type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp">
        </div>
        <div class="mb-3">
            <label for="exampleInputPassword1" class="form-label text-light">Password :</label>
            <input type="password" class="form-control" id="exampleInputPassword1">
        </div>
        <div class="mb-3">
            <label class="text-light form-label">Gender :</label>
            <select class="form-select" aria-label="Default select example">
            <option value="1">Female</option>
            <option value="2">Male</option>
        </select>
        </div>
        <button type="submit" class="btn btn-success w-100">Register</button>
    </form>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="./../assets/js/bootstarp.min.js"></script>
    <script src="./../assets/js/index.js"></script>

</html>
